# nginx reverse proxy configuration for Ubuntuagent (10.0.2.6)
# Provides TLS termination for Keycloak, TheHive, Shuffle, and EC2 portal
# Fixed port 443 after initial issue with port 80 conflict (Fixed_ngix_443.png)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Keycloak - SSO portal
    server {
        listen 8443 ssl;
        server_name 10.0.2.6;

        ssl_certificate /etc/nginx/certs/nexashield.crt;
        ssl_certificate_key /etc/nginx/certs/nexashield.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://keycloak:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # TheHive - case management
    server {
        listen 9443 ssl;
        server_name 10.0.2.6;

        ssl_certificate /etc/nginx/certs/nexashield.crt;
        ssl_certificate_key /etc/nginx/certs/nexashield.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://thehive:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
        }
    }

    # Shuffle SOAR
    server {
        listen 3443 ssl;
        server_name 10.0.2.6;

        ssl_certificate /etc/nginx/certs/nexashield.crt;
        ssl_certificate_key /etc/nginx/certs/nexashield.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://shuffle-frontend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
