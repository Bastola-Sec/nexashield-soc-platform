# Suricata 7.0.11 configuration for pfSense-NexaShield
# Extracted from pfSense Services > Suricata > Interface Settings
# Three instances running: em0 (WAN), em1 (LAN), em2 (REDTEAM)

%YAML 1.1
---

# Network interface configuration
af-packet:
  - interface: em1
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes
    use-mmap: yes
    tpacket-v3: yes

# Logging output
outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: /var/log/suricata/suricata_em132891/eve.json
      types:
        - alert:
            payload: yes
            payload-buffer-size: 4kb
            http-body: yes
            http-body-printable: yes
            metadata: yes
            tagged-packets: yes
        - http:
            extended: yes
        - dns:
            query: yes
            answer: yes
        - tls:
            extended: yes
        - files:
            force-magic: no
        - ssh
        - flow

# Detection engine
detect:
  profile: high
  custom-values:
    toclient-groups: 3
    toserver-groups: 25
  sgh-mpm-context: auto
  inspection-recursion-limit: 3000

# Alert threshold
threshold-file: /usr/local/etc/suricata/threshold.conf

# Rule files
default-rule-path: /usr/local/etc/suricata/rules
rule-files:
  - suricata.rules

# Logging to Wazuh via syslog
syslog:
  enabled: yes
  facility: daemon
  format: rfc3164
  host: 10.0.2.4
  port: 514

# Performance settings for VirtualBox
# Hardware offloading must be disabled - VirtualBox NICs do not support it
threading:
  set-cpu-affinity: no
  cpu-affinity:
    - management-cpu-set:
        cpu: [ 0 ]
    - receive-cpu-set:
        cpu: [ 0 ]
    - worker-cpu-set:
        cpu: [ "all" ]
        mode: "balanced"

checksum-validation: none
