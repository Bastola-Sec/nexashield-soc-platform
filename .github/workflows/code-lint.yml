name: Code Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    name: Lint Python Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install flake8 pylint

      - name: Run flake8
        run: |
          flake8 scripts/ --max-line-length=120 --ignore=E501,W503 --count --statistics
        continue-on-error: true

      - name: Run pylint
        run: |
          pylint scripts/**/*.py --disable=C0114,C0115,C0116 --fail-under=6.0
        continue-on-error: true

  lint-yaml:
    name: Lint YAML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint configs/ .github/
        continue-on-error: true

  validate-json:
    name: Validate JSON Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate JSON structure
        run: |
          find . -name "*.json" -not -path "./node_modules/*" | while read f; do
            python3 -c "import json; json.load(open('$f'))" && echo "OK: $f" || echo "FAIL: $f"
          done
