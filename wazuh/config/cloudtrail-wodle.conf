<!-- Wazuh ossec.conf - AWS CloudTrail Integration -->
<!-- Location: /var/ossec/etc/ossec.conf -->

<wodle name="aws-s3">
  <disabled>no</disabled>
  <interval>5m</interval>
  <run_on_start>yes</run_on_start>
  <skip_on_error>yes</skip_on_error>
  <bucket type="cloudtrail">
    <name>YOUR_CLOUDTRAIL_BUCKET</name>
    <aws_profile>default</aws_profile>
    <only_logs_after>2026-MAY-20</only_logs_after>
    <regions>us-east-1,us-east-2,us-west-1</regions>
  </bucket>
</wodle>

<!-- Shuffle SOAR Integration -->
<integration>
  <name>shuffle</name>
  <hook_url>http://10.0.2.6:3001/api/v1/hooks/YOUR_WEBHOOK_ID</hook_url>
  <rule_id>5710,5712,60204,80203,100001,100002,100003</rule_id>
  <alert_format>json</alert_format>
</integration>

<!-- Active Response - IAM Lockdown -->
<command>
  <name>iam-lockdown</name>
  <executable>iam_lockdown.py</executable>
  <timeout_allowed>yes</timeout_allowed>
</command>

<active-response>
  <command>iam-lockdown</command>
  <location>local</location>
  <rules_id>80203</rules_id>
  <timeout>60</timeout>
</active-response>
